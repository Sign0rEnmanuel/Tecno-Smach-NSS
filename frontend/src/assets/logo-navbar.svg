<svg width="480" height="280" viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg">
  <title>Tecno-Smach-NSS Logo</title>

  <!-- Chip body: centered at 240,110 -->
  <rect x="168" y="26" width="144" height="144" rx="12" fill="#1e293b"/>

  <!-- Inner grid lines horizontal -->
  <line x1="180" y1="56"  x2="300" y2="56"  stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="180" y1="78"  x2="300" y2="78"  stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="180" y1="100" x2="300" y2="100" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="180" y1="122" x2="300" y2="122" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="180" y1="144" x2="300" y2="144" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>

  <!-- Inner grid lines vertical -->
  <line x1="200" y1="38" x2="200" y2="158" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="222" y1="38" x2="222" y2="158" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="244" y1="38" x2="244" y2="158" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="266" y1="38" x2="266" y2="158" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="288" y1="38" x2="288" y2="158" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>

  <!-- Center emblem -->
  <rect x="216" y="74" width="48" height="48" rx="5" fill="#3b82f6"/>
  <rect x="224" y="82" width="32" height="32" rx="3" fill="#1e293b"/>
  <polygon points="244,86 236,102 243,102 236,114 252,96 244,96" fill="#60a5fa"/>

  <!-- Pins TOP -->
  <line x1="200" y1="26" x2="200" y2="12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="222" y1="26" x2="222" y2="12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="244" y1="26" x2="244" y2="12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="266" y1="26" x2="266" y2="12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="288" y1="26" x2="288" y2="12" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="10" r="3" fill="#3b82f6"/>
  <circle cx="222" cy="10" r="3" fill="#3b82f6"/>
  <circle cx="244" cy="10" r="3" fill="#3b82f6"/>
  <circle cx="266" cy="10" r="3" fill="#3b82f6"/>
  <circle cx="288" cy="10" r="3" fill="#3b82f6"/>

  <!-- Pins BOTTOM -->
  <line x1="200" y1="170" x2="200" y2="184" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="222" y1="170" x2="222" y2="184" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="244" y1="170" x2="244" y2="184" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="266" y1="170" x2="266" y2="184" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="288" y1="170" x2="288" y2="184" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="200" cy="186" r="3" fill="#3b82f6"/>
  <circle cx="222" cy="186" r="3" fill="#3b82f6"/>
  <circle cx="244" cy="186" r="3" fill="#3b82f6"/>
  <circle cx="266" cy="186" r="3" fill="#3b82f6"/>
  <circle cx="288" cy="186" r="3" fill="#3b82f6"/>

  <!-- Pins LEFT -->
  <line x1="168" y1="56"  x2="154" y2="56"  stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="78"  x2="154" y2="78"  stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="100" x2="154" y2="100" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="122" x2="154" y2="122" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="144" x2="154" y2="144" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="152" cy="56"  r="3" fill="#3b82f6"/>
  <circle cx="152" cy="78"  r="3" fill="#3b82f6"/>
  <circle cx="152" cy="100" r="3" fill="#3b82f6"/>
  <circle cx="152" cy="122" r="3" fill="#3b82f6"/>
  <circle cx="152" cy="144" r="3" fill="#3b82f6"/>

  <!-- Pins RIGHT -->
  <line x1="312" y1="56"  x2="326" y2="56"  stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="312" y1="78"  x2="326" y2="78"  stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="312" y1="100" x2="326" y2="100" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="312" y1="122" x2="326" y2="122" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="312" y1="144" x2="326" y2="144" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="328" cy="56"  r="3" fill="#3b82f6"/>
  <circle cx="328" cy="78"  r="3" fill="#3b82f6"/>
  <circle cx="328" cy="100" r="3" fill="#3b82f6"/>
  <circle cx="328" cy="122" r="3" fill="#3b82f6"/>
  <circle cx="328" cy="144" r="3" fill="#3b82f6"/>

  <!-- Brand name -->
  <text x="240" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="30" fill="#f8fafc" letter-spacing="-0.5">Tecno-<tspan fill="#3b82f6">Smach</tspan><tspan fill="#f8fafc">-NSS</tspan></text>

  <!-- Tagline -->
  <text x="240" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b" letter-spacing="4">STORE</text>

  <!-- Decorative line accent -->
  <line x1="168" y1="236" x2="188" y2="236" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="292" y1="236" x2="312" y2="236" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
