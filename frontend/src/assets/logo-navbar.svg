<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <title>Tecno-Smach-NSS Logo</title>

  <!-- Background transparent -->

  <!-- Chip body -->
  <rect x="268" y="100" width="144" height="144" rx="12" fill="#1e293b"/>

  <!-- Inner grid lines horizontal -->
  <line x1="280" y1="130" x2="400" y2="130" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="280" y1="152" x2="400" y2="152" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="280" y1="174" x2="400" y2="174" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="280" y1="196" x2="400" y2="196" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="280" y1="218" x2="400" y2="218" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>

  <!-- Inner grid lines vertical -->
  <line x1="300" y1="112" x2="300" y2="232" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="322" y1="112" x2="322" y2="232" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="344" y1="112" x2="344" y2="232" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="366" y1="112" x2="366" y2="232" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>
  <line x1="388" y1="112" x2="388" y2="232" stroke="#3b82f6" stroke-width="0.8" opacity="0.35"/>

  <!-- Center circuit emblem -->
  <rect x="316" y="148" width="48" height="48" rx="5" fill="#3b82f6"/>
  <rect x="324" y="156" width="32" height="32" rx="3" fill="#1e293b"/>
  <!-- Lightning bolt -->
  <polygon points="344,160 336,176 343,176 336,188 352,170 344,170" fill="#60a5fa"/>

  <!-- Pins TOP -->
  <line x1="300" y1="100" x2="300" y2="86" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="322" y1="100" x2="322" y2="86" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="344" y1="100" x2="344" y2="86" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="366" y1="100" x2="366" y2="86" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="388" y1="100" x2="388" y2="86" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="300" cy="84" r="3" fill="#3b82f6"/>
  <circle cx="322" cy="84" r="3" fill="#3b82f6"/>
  <circle cx="344" cy="84" r="3" fill="#3b82f6"/>
  <circle cx="366" cy="84" r="3" fill="#3b82f6"/>
  <circle cx="388" cy="84" r="3" fill="#3b82f6"/>

  <!-- Pins BOTTOM -->
  <line x1="300" y1="244" x2="300" y2="258" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="322" y1="244" x2="322" y2="258" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="344" y1="244" x2="344" y2="258" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="366" y1="244" x2="366" y2="258" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="388" y1="244" x2="388" y2="258" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="300" cy="260" r="3" fill="#3b82f6"/>
  <circle cx="322" cy="260" r="3" fill="#3b82f6"/>
  <circle cx="344" cy="260" r="3" fill="#3b82f6"/>
  <circle cx="366" cy="260" r="3" fill="#3b82f6"/>
  <circle cx="388" cy="260" r="3" fill="#3b82f6"/>

  <!-- Pins LEFT -->
  <line x1="268" y1="130" x2="254" y2="130" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="268" y1="152" x2="254" y2="152" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="268" y1="174" x2="254" y2="174" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="268" y1="196" x2="254" y2="196" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="268" y1="218" x2="254" y2="218" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="252" cy="130" r="3" fill="#3b82f6"/>
  <circle cx="252" cy="152" r="3" fill="#3b82f6"/>
  <circle cx="252" cy="174" r="3" fill="#3b82f6"/>
  <circle cx="252" cy="196" r="3" fill="#3b82f6"/>
  <circle cx="252" cy="218" r="3" fill="#3b82f6"/>

  <!-- Pins RIGHT -->
  <line x1="412" y1="130" x2="426" y2="130" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="412" y1="152" x2="426" y2="152" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="412" y1="174" x2="426" y2="174" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="412" y1="196" x2="426" y2="196" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="412" y1="218" x2="426" y2="218" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="428" cy="130" r="3" fill="#3b82f6"/>
  <circle cx="428" cy="152" r="3" fill="#3b82f6"/>
  <circle cx="428" cy="174" r="3" fill="#3b82f6"/>
  <circle cx="428" cy="196" r="3" fill="#3b82f6"/>
  <circle cx="428" cy="218" r="3" fill="#3b82f6"/>

  <!-- Brand name -->
  <text x="340" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="30" fill="#1e293b" letter-spacing="-0.5">Tecno-<tspan fill="#3b82f6">Smach</tspan><tspan fill="#1e293b">-NSS</tspan></text>

  <!-- Tagline -->
  <text x="340" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b" letter-spacing="4">STORE</text>

  <!-- Decorative line accent -->
  <line x1="268" y1="318" x2="288" y2="318" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="392" y1="318" x2="412" y2="318" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
